<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissor Game</title>
</head>
<body>

    <h1>Rock Paper Scissor</h1>

    <div class="container">

        <div class="rock">
            <img src="rock img.png" alt="rock" id="rock">
        </div>

        <div class="paper">
            <img src="paper img.png" alt="paper" id="paper">
        </div>

        <div class="scissors">
            <img src="Scissors img.png" alt="Scissors" id="scissors">
        </div>

    </div>

    <h2 id="computerchoice">Computer choice:</h2>

    <h2 id="result"> Result:</h2>

    <h2 id="yourscore">Your Score:</h2>

    <h2 id="computerscore">Computer Score:</h2>
    <script src="script.js"></script>
</body>
</html>
